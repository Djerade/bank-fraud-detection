# ZooKeeper + Kafka (3 brokers) + Kafka UI + API simulateur (FastAPI) — fichier unique.
#
# Démarrage (racine du dépôt) : docker compose up -d --build
#
# L’API monte le code depuis l’hôte et tourne avec uvicorn --reload : une sauvegarde
# dans simulateur/ ou src/bank_fraud_detection/ redémarre le serveur (voir les logs).
# Sur Docker Desktop, si le reload ne part pas, décommentez WATCHFILES_FORCE_POLLING.
#
# Pour une image « figée » (sans montage ni reload), retirez volumes, command et
# la variable WATCHFILES_FORCE_POLLING sous simulateur-api (le CMD du Dockerfile s’applique).
#
# Depuis la machine hôte :
#   - Kafka : localhost:9092, localhost:9093, localhost:9094
#   - ZooKeeper : localhost:2181
#   - Kafka UI : http://127.0.0.1:8080
#   - API : http://127.0.0.1:8000/docs
#
# Réseau interne (clients Docker) : kafka-1:29092, kafka-2:29092, kafka-3:29092

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    hostname: zookeeper
    restart: unless-stopped
    ports:
      - "127.0.0.1:2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - bank-fraud-detection-network
    # Port ouvert sur 2181 (plus fiable que « ruok | nc | grep » selon la version de nc).
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  kafka-1:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka-1
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - bank-fraud-detection-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  kafka-2:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka-2
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - bank-fraud-detection-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9093 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  kafka-3:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka-3
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    networks:
      - bank-fraud-detection-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9094 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  kafka-ui:
    # Image Docker Hub officielle : provectuslabs/kafka-ui (pas « provectus/kafka-ui »).
    # Alternative maintenue : kafbat/kafka-ui + DYNAMIC_CONFIG_ENABLED=true
    image: provectuslabs/kafka-ui:v0.7.2
    hostname: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bank-fraud-detection
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - bank-fraud-detection-network

  simulateur-api:
    build:
      context: .
      dockerfile: simulateur/Dockerfile
    image: bank-fraud-detection-simulateur:latest
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_TOPIC_RAW: bank.transactions.raw
      KAFKA_TOPIC_PROCESSED: bank.transactions.processed

    volumes:
      - ./src/bank_fraud_detection:/app/src/bank_fraud_detection
      - ./simulateur:/app/simulateur
    command:
      - uvicorn
      - simulateur.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/simulateur
      - --reload-dir
      - /app/src/bank_fraud_detection
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - bank-fraud-detection-network

networks:
  bank-fraud-detection-network:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
