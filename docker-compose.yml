# ZooKeeper + Kafka (1 broker) + Kafka UI + API simulateur (FastAPI).
#
# Environnement de travail prévu : tout tourne dans Docker ; l’hôte sert surtout à
# lancer Compose et à ouvrir les URLs / curl sur les ports publiés.
#
# Démarrage (racine du dépôt) : docker compose up -d --build
#
# L’API tourne avec uvicorn --reload et des volumes sur simulateur/, Config/ et
# kafka-cluster/ : une sauvegarde dans ces dossiers est reflétée dans le conteneur
# (reload API pour le code FastAPI ; scripts kafka-cluster utilisables via
# docker compose exec simulateur-api, voir readme).
# Sur Docker Desktop, si le reload ne part pas, décommentez WATCHFILES_FORCE_POLLING.
#
# Pour une image « figée » (sans montage ni reload), retirez volumes, command et
# la variable WATCHFILES_FORCE_POLLING sous simulateur-api (le CMD du Dockerfile s’applique).
#
# Ports exposés sur l’hôte (accès navigateur / outils externes) :
#   - Kafka : localhost:9092
#   - ZooKeeper : localhost:2181
#   - Kafka UI : http://127.0.0.1:8080
#   - API : http://127.0.0.1:8000/docs
#
# Réseau interne (services Compose) : kafka:29092
#
# Si tu passais d’un cluster à 3 brokers : `docker compose down -v` pour repartir sur des
# volumes propres (anciens topics en réplication 3 peuvent poser problème avec 1 broker).

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    hostname: zookeeper
    restart: unless-stopped
    ports:
      - "127.0.0.1:2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - bank-fraud-detection-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - bank-fraud-detection-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  kafka-ui:
    # Image Docker Hub officielle : provectuslabs/kafka-ui (pas « provectus/kafka-ui »).
    image: provectuslabs/kafka-ui:latest
    hostname: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bank-fraud-detection
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - bank-fraud-detection-network

  simulateur-api:
    build:
      context: .
      dockerfile: simulateur/Dockerfile
    image: bank-fraud-detection-simulateur:latest
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: bank.transactions.raw
      # Docker Desktop : décommenter si --reload ne réagit pas aux sauvegardes
      # WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./simulateur:/app/simulateur
      - ./Config:/app/Config
      - ./kafka-cluster:/app/kafka-cluster
    command:
      - uvicorn
      - simulateur.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/simulateur
      - --reload-dir
      - /app/Config
      - --reload-dir
      - /app/kafka-cluster
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bank-fraud-detection-network

networks:
  bank-fraud-detection-network:
    driver: bridge

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
