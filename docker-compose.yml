# Kafka (KRaft) + API simulateur (FastAPI).
#
# Démarrage : docker compose up -d --build
#
# Depuis la machine hôte :
#   - Kafka : localhost:9092
#   - API   : http://127.0.0.1:8000/docs
#
# Les services sur le réseau Compose utilisent le listener interne kafka:29092
# (pas localhost, qui désigne le conteneur lui-même).

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - bank-fraud-detection-network

  bank-system-api:
    build:
      context: .
      dockerfile: simulateur/Dockerfile
    image: bank-fraud-detection-simulateur:latest
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # Listener PLAINTEXT interne (même réseau Docker que ce conteneur)
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_RAW: bank.transactions.raw
      KAFKA_TOPIC_PROCESSED: bank.transactions.processed
    depends_on:
      - kafka
    networks:
      - bank-fraud-detection-network

networks:
  bank-fraud-detection-network:
    driver: bridge